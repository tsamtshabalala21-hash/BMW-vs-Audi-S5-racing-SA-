<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AAA SA Racing - BMW vs Audi</title>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:black;
}

#ui {
  position:absolute;
  top:10px;
  left:10px;
  z-index:10;
  color:white;
  background:rgba(0,0,0,0.5);
  padding:10px;
  border-radius:10px;
}

button {
  padding:10px;
  margin-top:5px;
  cursor:pointer;
}

#controls {
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
}

.ctrl {
  padding:15px;
  margin:5px;
  font-size:18px;
}
</style>
</head>

<body>

<div id="ui">
<h2>AAA SA Racing</h2>
<p id="speed">Speed: 0</p>
<p id="status">Ready</p>
<button onclick="startGame()">START</button>
</div>

<div id="controls">
<button class="ctrl" onclick="left()">⬅</button>
<button class="ctrl" onclick="nitro()">⚡</button>
<button class="ctrl" onclick="right()">➡</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 200);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ================= LIGHT =================
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

// ambient glow
scene.add(new THREE.AmbientLight(0x444444));

// ================= ROAD =================
const road = new THREE.Mesh(
  new THREE.PlaneGeometry(10, 500),
  new THREE.MeshStandardMaterial({color:0x222222})
);
road.rotation.x = -Math.PI/2;
scene.add(road);

// lane lines
for(let i=0;i<50;i++){
  const line = new THREE.Mesh(
    new THREE.BoxGeometry(0.2,0.1,3),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  line.position.set(0,0.01,-i*10);
  scene.add(line);
}

// ================= SA CITY BUILDINGS =================
function building(x,z){
  const h = Math.random()*20 + 5;
  const b = new THREE.Mesh(
    new THREE.BoxGeometry(3,h,3),
    new THREE.MeshStandardMaterial({color:0x666666})
  );
  b.position.set(x,h/2,z);
  scene.add(b);
}

for(let i=0;i<80;i++){
  building(-10,-i*8);
  building(10,-i*8);
}

// ================= PLAYER CAR =================
const car = new THREE.Mesh(
  new THREE.BoxGeometry(1,0.5,2),
  new THREE.MeshStandardMaterial({color:0x0066ff})
);
car.position.y = 0.3;
scene.add(car);

// ================= AI TRAFFIC =================
let enemies = [];

function spawnCar(){
  const e = new THREE.Mesh(
    new THREE.BoxGeometry(1,0.5,2),
    new THREE.MeshStandardMaterial({color:0xff0000})
  );

  e.position.set((Math.random()*4)-2,0.3,car.position.z-100);
  scene.add(e);
  enemies.push(e);
}

// ================= GAME STATE =================
let speed = 0;
let running = false;
let carX = 0;
let nitro = false;

// ================= INPUT =================
document.addEventListener("keydown",(e)=>{
  if(e.key=="ArrowLeft") carX -= 0.5;
  if(e.key=="ArrowRight") carX += 0.5;

  if(e.key==" "){
    nitro = true;
    setTimeout(()=>nitro=false, 1000);
  }
});

function left(){ carX -= 0.5; }
function right(){ carX += 0.5; }
function nitroBoost(){ nitro = true; setTimeout(()=>nitro=false,1000); }

function nitro(){ nitroBoost(); }

// ================= START =================
function startGame(){
  running = true;
  loop();
}

// ================= LOOP =================
function loop(){

if(!running) return;

requestAnimationFrame(loop);

// speed logic
speed = nitro ? 0.6 : 0.25;

// move car
car.position.x += (carX - car.position.x)*0.1;

// spawn AI
if(Math.random()<0.03) spawnCar();

// move enemies
enemies.forEach((e,i)=>{
  e.position.z += speed*20;

  // collision
  if(Math.abs(car.position.x-e.position.x)<1 &&
     Math.abs(car.position.z-e.position.z)<1){
    document.getElementById("status").innerHTML="CRASH - GAME OVER";
    running=false;
  }

  if(e.position.z > 20){
    scene.remove(e);
    enemies.splice(i,1);
  }
});

// camera cinematic follow
camera.position.x += (car.position.x - camera.position.x)*0.08;
camera.position.z = car.position.z + 8;
camera.position.y = 5;
camera.lookAt(car.position);

// UI
document.getElementById("speed").innerHTML =
"Speed: " + Math.round(speed*300);

renderer.render(scene,camera);

}

// resize
window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
                   </html>
