<!DOCTYPE html>
<html>
<head>
<title>BMW M4 vs Audi S5 Racing Championship</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
overflow:hidden;
}

#game{
position:relative;
width:400px;
height:700px;
background:#444;
margin:auto;
overflow:hidden;
border:4px solid white;
}

.line{
position:absolute;
left:195px;
width:10px;
height:100px;
background:white;
}

.car{
position:absolute;
width:60px;
height:120px;
border-radius:10px;
}

#player{
background:blue;
bottom:20px;
left:170px;
}

.enemy{
background:red;
}

.coin{
position:absolute;
width:30px;
height:30px;
background:gold;
border-radius:50%;
}

button{
padding:15px 30px;
font-size:20px;
margin:10px;
}

</style>
</head>
<body>

<h1>BMW M4 vs Audi S5 Racing Championship</h1>

<h2 id="score">Score: 0</h2>
<h2 id="coins">Coins: 0</h2>

<button onclick="startGame()">Start Race</button>

<div id="game">

<div class="line" style="top:0px"></div>
<div class="line" style="top:150px"></div>
<div class="line" style="top:300px"></div>
<div class="line" style="top:450px"></div>
<div class="line" style="top:600px"></div>

<div id="player" class="car"></div>

<div id="enemy1" class="car enemy" style="top:-150px;left:80px"></div>
<div id="enemy2" class="car enemy" style="top:-400px;left:250px"></div>

<div id="coin" class="coin" style="top:-200px;left:180px"></div>

</div>

<script>

let speed=5;
let score=0;
let coins=0;
let running=false;

let player=document.getElementById("player");

let enemy1=document.getElementById("enemy1");
let enemy2=document.getElementById("enemy2");

let coin=document.getElementById("coin");

let playerX=170;

document.addEventListener("keydown",function(e){

if(e.key=="ArrowLeft"){
playerX-=25;
}

if(e.key=="ArrowRight"){
playerX+=25;
}

if(playerX<0) playerX=0;
if(playerX>340) playerX=340;

player.style.left=playerX+"px";

});

function startGame(){

if(running)return;

running=true;

loop();

}

function loop(){

if(!running)return;

moveEnemy(enemy1);
moveEnemy(enemy2);
moveCoin();

score++;

document.getElementById("score").innerHTML="Score: "+score;

requestAnimationFrame(loop);

}

function moveEnemy(enemy){

enemy.style.top=(enemy.offsetTop+speed)+"px";

if(enemy.offsetTop>700){

enemy.style.top="-150px";

enemy.style.left=Math.random()*340+"px";

speed+=0.2;

}

if(hit(player,enemy)){

alert("Game Over");

running=false;

}

}

function moveCoin(){

coin.style.top=(coin.offsetTop+speed)+"px";

if(coin.offsetTop>700){

coin.style.top="-100px";

coin.style.left=Math.random()*340+"px";

}

if(hit(player,coin)){

coins++;

document.getElementById("coins").innerHTML="Coins: "+coins;

coin.style.top="-100px";

}

}

function hit(a,b){

return !(

a.offsetLeft+a.offsetWidth<b.offsetLeft ||

a.offsetLeft>b.offsetLeft+b.offsetWidth ||

a.offsetTop+a.offsetHeight<b.offsetTop ||

a.offsetTop>b.offsetTop+b.offsetHeight

);

}

</script>

</body>
  </html>
