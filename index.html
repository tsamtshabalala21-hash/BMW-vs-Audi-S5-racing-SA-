<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AAA SA Racing FIXED</title>

<style>
body { margin:0; overflow:hidden; background:#000; font-family:Arial; }

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
z-index:10;
}

button{ padding:10px; }
</style>
</head>

<body>

<div id="ui">
<h3>AAA SA Racing FIXED</h3>
<p id="status">Ready</p>
<button onclick="startGame()">START</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// ================= BASIC SETUP =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ================= LIGHT =================
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// ================= ROAD =================
const road = new THREE.Mesh(
new THREE.PlaneGeometry(20, 500),
new THREE.MeshStandardMaterial({color:0x333333})
);
road.rotation.x = -Math.PI/2;
road.position.z = -200;
scene.add(road);

// lane line
for(let i=0;i<30;i++){
const line = new THREE.Mesh(
new THREE.BoxGeometry(0.3,0.1,5),
new THREE.MeshStandardMaterial({color:0xffffff})
);

line.position.set(0,0.01,-i*15);
scene.add(line);
}

// ================= CAR (PLAYER) =================
const car = new THREE.Mesh(
new THREE.BoxGeometry(1,0.5,2),
new THREE.MeshStandardMaterial({color:0x0066ff})
);
car.position.set(0,0.3,0);
scene.add(car);

// ================= BUILDINGS =================
function addBuilding(x,z){
const h = Math.random()*10+2;

const b = new THREE.Mesh(
new THREE.BoxGeometry(3,h,3),
new THREE.MeshStandardMaterial({color:0x777777})
);

b.position.set(x,h/2,z);
scene.add(b);
}

for(let i=0;i<50;i++){
addBuilding(-6,-i*10);
addBuilding(6,-i*10);
}

// ================= CAMERA POSITION (IMPORTANT FIX) =================
camera.position.set(0,5,8);
camera.lookAt(0,0,0);

// ================= GAME STATE =================
let running = false;
let carX = 0;

// ================= INPUT =================
document.addEventListener("keydown",(e)=>{
if(e.key=="ArrowLeft") carX -= 0.5;
if(e.key=="ArrowRight") carX += 0.5;
});

// ================= START =================
function startGame(){
running = true;
document.getElementById("status").innerHTML = "Racing...";
animate();
}

// ================= LOOP =================
function animate(){

if(!running) return;

requestAnimationFrame(animate);

// move car smoothly
car.position.x += (carX - car.position.x)*0.1;

// FIX: move camera WITH CAR
camera.position.x = car.position.x;
camera.position.z = car.position.z + 8;
camera.lookAt(car.position);

// simple road motion illusion
road.position.z += 0.5;
if(road.position.z > 0) road.position.z = -200;

// render
renderer.render(scene,camera);
}

// resize fix
window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
  </html>
